<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Code Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .profile-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
            margin: 0 auto 20px;
        }
        .profile-info {
            margin-bottom: 30px;
        }
        .profile-info h2 {
            margin-bottom: 10px;
        }
        .profile-info p {
            color: var(--text-secondary);
        }
        .profile-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
    </style>
</head>
<body class="auth-page">
    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-avatar" id="profile-avatar">U</div>
            <div class="profile-info">
                <h2 id="profile-name">User Name</h2>
                <p id="profile-email">user@example.com</p>
                <div style="margin-top: 15px; color: var(--text-secondary); font-size: 14px;">
                    Role: <span id="profile-role">User</span>
                </div>
            </div>
            <div class="profile-actions">
                <button class="auth-btn" onclick="window.location.href='index.html'">Open Editor</button>
                <button class="auth-btn" style="background-color: #f85149;" id="profile-logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Auth.currentUser;
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('profile-name').textContent = user.username;
            document.getElementById('profile-email').textContent = user.email;
            document.getElementById('profile-avatar').textContent = user.username[0].toUpperCase();
            document.getElementById('profile-role').textContent = user.username === 'admin' ? 'Administrator' : 'Developer';

            document.getElementById('profile-logout-btn').onclick = () => {
                if (confirm('Are you sure you want to logout?')) {
                    Auth.logout();
                }
            };
        });
    </script>
</body>
</html>
